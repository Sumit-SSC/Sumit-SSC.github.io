	<script>
		// Skills data organized by categories
		const skillsData = {
			"Programming Languages": [
				{ name: "Python", level: 90, icon: "fab fa-python", color: "#3776ab" },
				{ name: "SQL", level: 85, icon: "fas fa-database", color: "#336791" },
				{ name: "R (learning)", level: 40, icon: "fab fa-r-project", color: "#276DC3" },
			],
			"Analytics & ML": [
				{ name: "pandas", level: 90, icon: "fas fa-table", color: "#150458" },
				{ name: "scikit-learn", level: 85, icon: "fas fa-brain", color: "#F7931E" },
				{ name: "XGBoost", level: 80, icon: "fas fa-chart-line", color: "#FF6B6B" },
				{ name: "NumPy", level: 85, icon: "fas fa-calculator", color: "#4DABCF" },
				{ name: "Matplotlib", level: 80, icon: "fas fa-chart-bar", color: "#11557C" },
				{ name: "Seaborn", level: 75, icon: "fas fa-chart-area", color: "#3776ab" },
			],
			"Business Intelligence": [
				{ name: "Power BI", level: 85, icon: "fab fa-microsoft", color: "#F2C811" },
				{ name: "DAX", level: 80, icon: "fas fa-code", color: "#F2C811" },
				{ name: "Tableau", level: 75, icon: "fas fa-chart-pie", color: "#E97627" },
				{ name: "Excel", level: 90, icon: "fas fa-file-excel", color: "#217346" },
			],
			"Web & Deployment": [
				{ name: "HTML", level: 60, icon: "fab fa-html5", color: "#E34F26" },
				{ name: "CSS", level: 60, icon: "fab fa-css3-alt", color: "#1572B6" },
				{ name: "JavaScript", level: 60, icon: "fab fa-js-square", color: "#F7DF1E" },
				{ name: "Streamlit", level: 85, icon: "fas fa-stream", color: "#FF4B4B" },
				{ name: "Git", level: 80, icon: "fab fa-git-alt", color: "#F05032" },
				{ name: "GitHub", level: 85, icon: "fab fa-github", color: "#181717" },
			],
			"Analytics & Testing": [
				{ name: "A/B Testing", level: 80, icon: "fas fa-flask", color: "#667eea" },
				{ name: "Statistical Analysis", level: 85, icon: "fas fa-chart-line", color: "#764ba2" },
				{ name: "Hypothesis Testing", level: 80, icon: "fas fa-check-circle", color: "#667eea" },
			],
			"Tools & Libraries": [
				{ name: "Jupyter", level: 90, icon: "fab fa-python", color: "#F37626" },
				{ name: "OpenCV", level: 70, icon: "fas fa-eye", color: "#5C3EE8" },
				{ name: "statsmodels", level: 75, icon: "fas fa-chart-bar", color: "#3776ab" },
			]
		};

		// Render skills page
		function renderSkills() {
			const container = document.getElementById('skills-container');
			if (!container) return;

			let html = '';
			for (const [category, skills] of Object.entries(skillsData)) {
				html += `
					<div class="skill-category">
						<h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-8 text-center">${category}</h2>
						<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
							${skills.map(skill => `
								<div class="skill-card bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 hover:shadow-xl transition-shadow duration-300 cursor-pointer" 
									 onclick="filterProjectsBySkill('${skill.name}')">
									<div class="flex items-center justify-between mb-4">
										<div class="flex items-center gap-3">
											<i class="${skill.icon} text-3xl" style="color: ${skill.color}"></i>
											<h3 class="text-xl font-semibold text-gray-800 dark:text-gray-100">${skill.name}</h3>
										</div>
									</div>
									<div class="skill-bar-container">
										<div class="flex justify-between items-center mb-2">
											<span class="text-sm text-gray-600 dark:text-gray-300">Proficiency</span>
											<span class="text-sm font-semibold text-gray-800 dark:text-gray-100">${skill.level}%</span>
										</div>
										<div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
											<div class="skill-bar h-full rounded-full transition-all duration-1000 ease-out" 
												 style="width: ${skill.level}%; background: linear-gradient(135deg, ${skill.color} 0%, ${skill.color}dd 100%);">
											</div>
										</div>
									</div>
								</div>
							`).join('')}
						</div>
					</div>
				`;
			}
			container.innerHTML = html;

			// Animate skill bars on scroll
			const observer = new IntersectionObserver((entries) => {
				entries.forEach(entry => {
					if (entry.isIntersecting) {
						const skillBar = entry.target.querySelector('.skill-bar');
						if (skillBar) {
							const width = skillBar.style.width;
							skillBar.style.width = '0%';
							setTimeout(() => {
								skillBar.style.width = width;
							}, 100);
						}
					}
				});
			}, { threshold: 0.1 });

			document.querySelectorAll('.skill-card').forEach(card => {
				observer.observe(card);
			});
		}

		// Filter projects by skill
		function filterProjectsBySkill(skillName) {
			window.location.href = `homepage.html?filter=${encodeURIComponent(skillName)}`;
		}

		// Initialize scroll progress bar
		function initScrollProgress() {
			const progressBar = document.getElementById('scroll-progress');
			if (!progressBar) return;

			window.addEventListener('scroll', () => {
				const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
				const scrolled = (window.scrollY / windowHeight) * 100;
				progressBar.style.width = scrolled + '%';
			});
		}

		// Initialize on load
		document.addEventListener('DOMContentLoaded', () => {
			renderSkills();
			initScrollProgress();
		});
	</script>
