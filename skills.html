		// Render skills page
		function renderSkills() {
			const container = document.getElementById('skills-container');
			if (!container) return;

			let html = '';
			for (const [category, skills] of Object.entries(skillsData)) {
				html += `
					<div class="skill-category">
						<h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-8 text-center">${category}</h2>
						<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
							${skills.map(skill => `
								<div class="skill-card bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 hover:shadow-xl transition-shadow duration-300 cursor-pointer" 
									 onclick="filterProjectsBySkill('${skill.name}')">
									<div class="flex items-center justify-between mb-4">
									<div class="flex items-center gap-3">
										${skill.iconUrl
											? `<img src="${skill.iconUrl}" alt="${skill.name}" class="h-7 w-7 object-contain" />`
											: `<i class="${skill.icon} text-3xl" style="color: ${skill.color}"></i>`}
										<h3 class="text-xl font-semibold text-gray-800 dark:text-gray-100">${skill.name}</h3>
									</div>
									</div>
									<div class="skill-bar-container">
										<div class="flex justify-between items-center mb-2">
											<span class="text-sm text-gray-600 dark:text-gray-300">Proficiency</span>
											<span class="text-sm font-semibold text-gray-800 dark:text-gray-100">${skill.level}%</span>
										</div>
										<div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
											<div class="skill-bar h-full rounded-full transition-all duration-1000 ease-out" 
												 style="width: ${skill.level}%; background: linear-gradient(135deg, ${skill.color} 0%, ${skill.color}dd 100%);">
											</div>
										</div>
									</div>
								</div>
							`).join('')}
						</div>
					</div>
				`;
			}
			container.innerHTML = html;

			// Animate skill bars on scroll
			const observer = new IntersectionObserver((entries) => {
				entries.forEach(entry => {
					if (entry.isIntersecting) {
						const skillBar = entry.target.querySelector('.skill-bar');
						if (skillBar) {
							const width = skillBar.style.width;
							skillBar.style.width = '0%';
							setTimeout(() => {
								skillBar.style.width = width;
							}, 100);
						}
					}
				});
			}, { threshold: 0.1 });

			document.querySelectorAll('.skill-card').forEach(card => {
				observer.observe(card);
			});
		}

		// Filter projects by skill
		function filterProjectsBySkill(skillName) {
			window.location.href = `homepage.html?filter=${encodeURIComponent(skillName)}`;
		}

		// Initialize scroll progress bar
		function initScrollProgress() {
			const progressBar = document.getElementById('scroll-progress');
			if (!progressBar) return;

			window.addEventListener('scroll', () => {
				const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
				const scrolled = (window.scrollY / windowHeight) * 100;
				progressBar.style.width = scrolled + '%';
			});
		}

		// Initialize on load
		document.addEventListener('DOMContentLoaded', () => {
			renderSkills();
			initScrollProgress();
		});
	</script>
