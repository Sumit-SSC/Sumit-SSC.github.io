			tabs.forEach(function(btn) {
				btn.addEventListener('click', function() {
					var tab = btn.getAttribute('data-tab') || 'youtube';
					activateTab(tab);
				});
			});

			// Wire up YouTube selectors to swap the embedded video in-place
			var ytFrame = document.getElementById('yt-embed');
			if (ytFrame) {
				var buttons = document.querySelectorAll('.yt-select');
				buttons.forEach(function(btn) {
					btn.addEventListener('click', function() {
						var vid = btn.getAttribute('data-video-id');
						if (!vid) return;
						ytFrame.src = 'https://www.youtube.com/embed/' + vid + '?rel=0';
						buttons.forEach(function(b) { b.classList.remove('font-semibold'); });
						btn.classList.add('font-semibold');
					});
				});
			}

			// YouTube search button → open YouTube results for this topic
			var searchBtn = document.getElementById('res-yt-search');
			if (searchBtn && t && t.title) {
				searchBtn.addEventListener('click', function() {
					var q = 'best ' + t.title + ' tutorial for beginners';
					var url = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);
					window.open(url, '_blank', 'noopener');
				});
			}
		})();
	</script>
</body>
</html>
