	<!-- Giscus: lazy-load when disclosure opens (scroll progress handled in main.js) -->
	<script>
		(function () {
			var giscusMounted = false;

			function getGiscusTheme() {
				return document.documentElement.classList.contains('dark-theme') ? 'dark' : 'light';
			}

			function mountGiscus() {
				if (giscusMounted) return;
				giscusMounted = true;
				var urlParams = new URLSearchParams(window.location.search);
				var projectId = urlParams.get('id') || 'general';
				var theme = getGiscusTheme();
				var giscusScript = document.createElement('script');
				giscusScript.src = 'https://giscus.app/client.js';
				giscusScript.setAttribute('data-repo', 'Sumit-SSC/Sumit-SSC.github.io');
				giscusScript.setAttribute('data-repo-id', 'R_kgDOLETHwQ');
				giscusScript.setAttribute('data-category', 'Project-Comments');
				giscusScript.setAttribute('data-category-id', 'DIC_kwDOLETHwc4C0QcF');
				giscusScript.setAttribute('data-mapping', 'specific');
				giscusScript.setAttribute('data-term', 'project→' + projectId);
				giscusScript.setAttribute('data-strict', '0');
				giscusScript.setAttribute('data-reactions-enabled', '1');
				giscusScript.setAttribute('data-emit-metadata', '0');
				giscusScript.setAttribute('data-input-position', 'bottom');
				giscusScript.setAttribute('data-theme', theme);
				giscusScript.setAttribute('data-lang', 'en');
				giscusScript.setAttribute('data-loading', 'lazy');
				giscusScript.crossOrigin = 'anonymous';
				giscusScript.async = true;
				var container = document.getElementById('giscus-root');
				if (container) container.appendChild(giscusScript);
			}

			function updateGiscusTheme() {
				var giscusFrame = document.querySelector('iframe[src*="giscus.app"]');
				if (giscusFrame && giscusFrame.contentWindow) {
					giscusFrame.contentWindow.postMessage(
						{ type: 'set-theme', theme: getGiscusTheme() },
						'https://giscus.app'
					);
				}
			}

			function bind() {
				var disclosure = document.getElementById('giscus-disclosure');
				if (disclosure) {
					disclosure.addEventListener('toggle', function () {
						if (disclosure.open) mountGiscus();
					});
				}
				new MutationObserver(updateGiscusTheme).observe(document.documentElement, {
					attributes: true,
					attributeFilter: ['class']
				});
				window.addEventListener('theme-changed', updateGiscusTheme);
			}

			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', bind);
			} else {
				bind();
			}
		})();
	</script>
