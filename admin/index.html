<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Admin Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="max-w-4xl mx-auto px-4 py-8">
    <header class="mb-6">
      <h1 class="text-2xl font-bold">Portfolio Admin</h1>
      <p class="text-sm text-slate-400 mt-1">Basic home. Use Edit Pages to open full editor workspace.</p>
    </header>

    <section class="rounded-xl border border-slate-700 bg-slate-900/70 p-4 mb-4">
      <h2 class="text-sm font-semibold mb-2">Session</h2>
      <p id="home-session" class="text-sm text-slate-300">Checking session…</p>
      <p id="home-server-time" class="text-xs text-slate-400 mt-1"></p>
      <div class="mt-3 flex flex-wrap gap-2">
        <button id="btn-login" class="rounded bg-slate-700 hover:bg-slate-600 px-3 py-2 text-sm">Login</button>
        <button id="btn-logout" class="rounded bg-slate-700 hover:bg-slate-600 px-3 py-2 text-sm">Logout</button>
        <button id="btn-refresh-session" class="rounded bg-slate-700 hover:bg-slate-600 px-3 py-2 text-sm">Refresh session</button>
      </div>
    </section>

    <section class="rounded-xl border border-slate-700 bg-slate-900/70 p-4 mb-4">
      <h2 class="text-sm font-semibold mb-2">Workspace</h2>
      <p class="text-sm text-slate-300">Open full page editor (left: records/blocks, middle: preview, right: editor).</p>
      <div class="mt-3">
        <a href="./editor.html" class="inline-block rounded bg-indigo-700 hover:bg-indigo-600 px-4 py-2 text-sm font-semibold">Edit Pages</a>
      </div>
    </section>

    <section class="rounded-xl border border-slate-700 bg-slate-900/70 p-4">
      <h2 class="text-sm font-semibold mb-2">Quick links</h2>
      <div class="flex flex-wrap gap-2 text-sm">
        <a class="rounded bg-slate-800 hover:bg-slate-700 px-3 py-1.5" href="https://sumit.indevs.in/admin/index.html">Admin home URL</a>
        <a class="rounded bg-slate-800 hover:bg-slate-700 px-3 py-1.5" href="https://sumit.indevs.in/admin/editor.html">Editor URL</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const API = "https://admin-api.sumit.indevs.in";
      const el = (id) => document.getElementById(id);
      function loginName(sess) {
        if (!sess || !sess.user) return "";
        if (typeof sess.user === "string") return sess.user;
        return sess.user.login || "";
      }
      async function refreshSession() {
        try {
          const res = await fetch(`${API}/api/admin/session`, { credentials: "include" });
          const s = await res.json();
          el("home-session").textContent = s.ok ? `Signed in as ${loginName(s) || "unknown"} (${s.role || "admin"})` : "Not signed in";
          el("home-server-time").textContent = s.serverTimeIst ? `Server IST: ${s.serverTimeIst}` : "";
        } catch (e) {
          el("home-session").textContent = "Session check failed";
          el("home-server-time").textContent = String(e && e.message ? e.message : e);
        }
      }
      el("btn-login").addEventListener("click", () => { window.location.href = `${API}/api/admin/auth/github/start`; });
      el("btn-logout").addEventListener("click", async () => {
        await fetch(`${API}/api/admin/auth/logout`, { credentials: "include" }).catch(() => {});
        await refreshSession();
      });
      el("btn-refresh-session").addEventListener("click", refreshSession);
      refreshSession();
    })();
  </script>
</body>
</html>
