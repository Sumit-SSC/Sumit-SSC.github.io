<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rich Content Editor · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --bg-alt: #f8fafc;
      --surface: #f1f5f9;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --success: #10b981;
      --danger: #ef4444;
    }

    body.dark {
      --bg: #0f172a;
      --bg-alt: #1e293b;
      --surface: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #475569;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 0;
      min-height: 100vh;
    }

    @media (max-width: 1400px) {
      .container {
        grid-template-columns: 1fr 1fr;
      }
      .sidebar-right { display: none; }
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
      .sidebar-left { display: none; }
      .sidebar-right { display: none; }
    }

    /* Sidebars */
    .sidebar-left, .sidebar-right {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      max-height: 100vh;
    }

    .sidebar-right {
      border-right: none;
      border-left: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Editor Area */
    .editor-wrapper {
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .editor-header h1 {
      font-size: 20px;
      font-weight: 700;
    }

    .editor-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
      align-items: center;
    }

    .toolbar-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    button {
      font: inherit;
      padding: 6px 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 500;
    }

    button:hover:not(:disabled) {
      background: var(--bg-alt);
      border-color: var(--border);
    }

    button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-hover);
    }

    button.danger {
      color: var(--danger);
    }

    button.danger:hover {
      background: var(--danger);
      color: white;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Block Editor */
    .block {
      position: relative;
      padding: 8px 0;
      margin: 12px 0;
      border-left: 3px solid transparent;
      padding-left: 16px;
      transition: all 0.2s;
    }

    .block:hover {
      border-left-color: var(--accent);
      background: var(--surface);
      border-radius: 4px;
      padding-left: 16px;
      margin-left: -16px;
      padding-left: 32px;
    }

    .block.selected {
      background: var(--surface);
      border-left-color: var(--accent);
    }

    .block-content {
      outline: none;
      font-size: 16px;
      line-height: 1.6;
      word-break: break-word;
      min-height: 24px;
    }

    .block-content:focus {
      outline: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 6px;
      margin: -2px -6px;
    }

    .block-content[data-type="h1"] {
      font-size: 32px;
      font-weight: 700;
      margin: 24px 0 12px;
      line-height: 1.2;
    }

    .block-content[data-type="h2"] {
      font-size: 24px;
      font-weight: 700;
      margin: 20px 0 10px;
      line-height: 1.2;
    }

    .block-content[data-type="h3"] {
      font-size: 20px;
      font-weight: 600;
      margin: 16px 0 8px;
      line-height: 1.3;
    }

    .block-content[data-type="p"] {
      font-size: 16px;
    }

    .block-content[data-type="quote"] {
      padding-left: 16px;
      border-left: 4px solid var(--accent);
      font-style: italic;
      color: var(--text-muted);
    }

    .block-content[data-type="code"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: var(--surface);
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Lists */
    ul, ol {
      margin: 8px 0;
      padding-left: 24px;
    }

    li {
      margin: 4px 0;
    }

    /* Block Controls */
    .block-controls {
      position: absolute;
      left: -44px;
      top: 8px;
      display: none;
      gap: 4px;
      opacity: 0.6;
    }

    .block:hover .block-controls {
      display: flex;
    }

    .block-controls button {
      padding: 4px 8px;
      font-size: 12px;
      cursor: grab;
    }

    .block-controls button:active {
      cursor: grabbing;
    }

    /* Add Block Buttons */
    .add-block {
      display: flex;
      justify-content: center;
      margin: 16px 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .block:hover + .add-block,
    .add-block:hover {
      opacity: 1;
    }

    .add-block button {
      padding: 8px 16px;
      font-size: 12px;
      background: var(--surface);
      border: 1px dashed var(--border);
      color: var(--text-muted);
    }

    /* Image Block */
    .image-block {
      width: 100%;
      max-width: 600px;
      margin: 16px 0;
      border-radius: 8px;
      border: 2px solid var(--border);
      overflow: hidden;
    }

    .image-block img {
      width: 100%;
      height: auto;
      display: block;
    }

    .image-upload {
      padding: 24px;
      text-align: center;
      border: 2px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .image-upload:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    /* Sidebar Items */
    .file-selector, .entry-list, .properties {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    .file-item, .entry-item, .prop-row {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }

    .file-item:hover, .entry-item:hover {
      background: var(--bg-alt);
      border-color: var(--accent);
    }

    .file-item.active, .entry-item.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .prop-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .prop-value {
      font-size: 13px;
      padding: 8px;
      background: var(--bg-alt);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
    }

    /* Status Bar */
    .status-bar {
      padding: 12px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Input Fields */
    input[type="text"], textarea, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-alt);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      margin-top: 4px;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
    }

    /* Messages */
    .message {
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <!-- LEFT SIDEBAR: File Selector -->
  <div class="sidebar-left">
    <div class="sidebar-title">📁 Content</div>
    <div class="file-selector" id="fileSelector">
      <div class="file-item" data-type="projects">
        🗂️ Projects
      </div>
      <div class="file-item" data-type="case-studies">
        📚 Case Studies
      </div>
      <div class="file-item" data-type="homepage-content">
        🏠 Homepage Content
      </div>
    </div>

    <div style="border-top: 1px solid var(--border); padding-top: 16px; margin-top: 16px;">
      <button class="primary" style="width: 100%; margin-bottom: 8px;" id="newEntryBtn">+ New Entry</button>
      <button style="width: 100%;" id="exportBtn">Export JSON</button>
    </div>

    <div id="entryList" class="entry-list hidden">
      <div class="sidebar-title" style="margin-top: 16px;">📄 Entries</div>
      <div id="entries"></div>
    </div>
  </div>

  <!-- CENTER: MAIN EDITOR -->
  <div class="editor-wrapper">
    <div class="editor-header">
      <div>
        <h1 id="editorTitle">Select content to edit</h1>
        <p id="editorSubtitle" style="font-size: 13px; color: var(--text-muted); margin-top: 4px;"></p>
      </div>
      <div style="display: flex; gap: 8px;">
        <button id="themeBtn">🌙</button>
        <button id="saveBtn" class="primary" disabled>💾 Save</button>
      </div>
    </div>

    <div class="editor-content" id="editorContent">
      <p style="color: var(--text-muted); text-align: center; padding: 32px;">Select a content type to begin editing</p>
    </div>

    <div class="status-bar">
      <div><span class="status-indicator"></span> <span id="statusText">Ready</span></div>
      <div id="wordCount">0 words</div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR: Properties & Formatting -->
  <div class="sidebar-right">
    <div class="sidebar-title">⚙️ Properties</div>
    
    <div id="properties" class="properties">
      <div>
        <div class="prop-label">Type</div>
        <select id="propType">
          <option value="projects">Projects</option>
          <option value="case-studies">Case Studies</option>
          <option value="homepage-content">Homepage Content</option>
        </select>
      </div>

      <div>
        <div class="prop-label">Entry ID</div>
        <div class="prop-value" id="propId">-</div>
      </div>

      <div>
        <div class="prop-label">Title</div>
        <input type="text" id="propTitle" placeholder="Entry title">
      </div>

      <div>
        <div class="prop-label">Description</div>
        <textarea id="propDesc" placeholder="Short description"></textarea>
      </div>

      <div style="border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px;">
        <button id="deleteBtn" class="danger" style="width: 100%;">🗑️ Delete Entry</button>
      </div>
    </div>

    <div style="border-top: 1px solid var(--border); padding-top: 16px; margin-top: 16px;">
      <div class="sidebar-title">🎨 Format</div>
      <div class="toolbar" style="flex-direction: column; gap: 8px;">
        <button onclick="formatBlock('h1')">H1</button>
        <button onclick="formatBlock('h2')">H2</button>
        <button onclick="formatBlock('h3')">H3</button>
        <button onclick="formatBlock('p')">Paragraph</button>
        <button onclick="formatBlock('quote')">Quote</button>
        <button onclick="formatBlock('code')">Code</button>
        <button onclick="formatBlock('ul')">Bullet List</button>
        <button onclick="formatBlock('ol')">Numbered List</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Rich Editor System
  const editor = {
    state: {
      currentType: null,
      currentEntry: null,
      currentData: null,
      isDirty: false,
      theme: localStorage.getItem('editor-theme') || 'light',
      files: {
        projects: { name: 'Projects', path: 'data/projects.json', data: null },
        'case-studies': { name: 'Case Studies', path: 'data/case_studies.json', data: null },
        'homepage-content': { name: 'Homepage Content', path: 'data/homepage-content.json', data: null },
      }
    },

    async init() {
      this.applyTheme();
      this.bindEvents();
      document.getElementById('themeBtn').addEventListener('click', () => this.toggleTheme());
    },

    bindEvents() {
      document.getElementById('fileSelector').addEventListener('click', (e) => {
        if (e.target.classList.contains('file-item')) {
          this.selectContentType(e.target.dataset.type);
        }
      });

      document.getElementById('newEntryBtn').addEventListener('click', () => this.newEntry());
      document.getElementById('exportBtn').addEventListener('click', () => this.exportJSON());
      document.getElementById('saveBtn').addEventListener('click', () => this.saveChanges());
      document.getElementById('deleteBtn').addEventListener('click', () => this.deleteEntry());

      document.getElementById('propTitle').addEventListener('input', () => this.markDirty());
      document.getElementById('propDesc').addEventListener('input', () => this.markDirty());
    },

    async selectContentType(type) {
      try {
        const file = this.state.files[type];
        const response = await fetch(file.path);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        file.data = data;
        
        this.state.currentType = type;
        this.state.currentData = data;
        this.state.currentEntry = null;
        
        this.renderContentType(type, data);
        this.updateFileSelector();
      } catch (err) {
        this.showError(`Failed to load: ${err.message}`);
      }
    },

    renderContentType(type, data) {
      const entries = document.getElementById('entries');
      const editorContent = document.getElementById('editorContent');
      const entriesList = document.getElementById('entryList');

      if (Array.isArray(data)) {
        // Projects or Case Studies
        entries.innerHTML = data.slice(0, 10).map(item => `
          <div class="entry-item" data-id="${item.id}">
            <strong>${item.title || 'Untitled'}</strong>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
              ${item.id || item.short_description?.slice(0, 40) || ''}
            </div>
          </div>
        `).join('');

        entries.addEventListener('click', (e) => {
          const item = e.target.closest('.entry-item');
          if (item) this.selectEntry(item.dataset.id, data);
        });

        entriesList.classList.remove('hidden');
        editorContent.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 32px;">Select an entry to edit</p>';
        document.getElementById('editorTitle').textContent = this.state.files[type].name;
      } else if (data.editor_content) {
        // Homepage content (Editor.js format)
        this.renderEditorContent(data.editor_content.blocks || []);
        document.getElementById('editorTitle').textContent = 'Homepage Content Blocks';
        entriesList.classList.add('hidden');
      }

      this.updateFileSelector();
    },

    selectEntry(id, data) {
      const entry = data.find(e => e.id === id);
      if (!entry) return;

      this.state.currentEntry = entry;
      this.renderRichEditor(entry);
      this.updateProperties(entry);
      this.updateFileSelector();
    },

    renderRichEditor(entry) {
      const editorContent = document.getElementById('editorContent');
      
      // Build editable blocks from entry
      let html = '';
      
      if (entry.title) {
        html += `<div class="block selected" data-type="h1">
          <div class="block-content" data-type="h1" contenteditable="true" onblur="editor.syncBlock(this)">${this.escapeHtml(entry.title)}</div>
        </div>`;
      }

      if (entry.short_description) {
        html += `<div class="block" data-type="p">
          <div class="block-content" data-type="p" contenteditable="true" onblur="editor.syncBlock(this)">${this.escapeHtml(entry.short_description)}</div>
        </div>`;
      }

      if (entry.problem_statement) {
        html += `<div class="block" data-type="h2">
          <div class="block-content" data-type="h2" contenteditable="true" onblur="editor.syncBlock(this)">Problem</div>
        </div>`;
        html += `<div class="block" data-type="p">
          <div class="block-content" data-type="p" contenteditable="true" onblur="editor.syncBlock(this)">${this.escapeHtml(entry.problem_statement?.replace(/<[^>]*>/g, '').slice(0, 200))}</div>
        </div>`;
      }

      html += `<div class="add-block"><button onclick="editor.addBlock()">+ Add block</button></div>`;

      editorContent.innerHTML = html;
      this.attachBlockHandlers();
    },

    renderEditorContent(blocks) {
      const editorContent = document.getElementById('editorContent');
      let html = '';

      blocks.forEach((block, i) => {
        const content = block.data?.text || block.data?.items?.join('\n') || '';
        const type = block.type === 'header' ? 'h' + (block.data?.level || 2) : block.type;
        html += `<div class="block" data-type="${type}">
          <div class="block-content" data-type="${type}" contenteditable="true" onblur="editor.syncBlock(this)">${this.escapeHtml(content)}</div>
        </div>`;
      });

      html += `<div class="add-block"><button onclick="editor.addBlock()">+ Add block</button></div>`;
      editorContent.innerHTML = html;
      this.attachBlockHandlers();
    },

    attachBlockHandlers() {
      const blocks = document.querySelectorAll('.block');
      blocks.forEach(block => {
        block.addEventListener('click', () => {
          document.querySelectorAll('.block').forEach(b => b.classList.remove('selected'));
          block.classList.add('selected');
        });
      });
    },

    syncBlock(el) {
      this.markDirty();
      this.updateWordCount();
    },

    addBlock() {
      const editorContent = document.getElementById('editorContent');
      const addBtn = editorContent.querySelector('.add-block');
      
      const newBlock = document.createElement('div');
      newBlock.className = 'block';
      newBlock.dataset.type = 'p';
      newBlock.innerHTML = `
        <div class="block-content" data-type="p" contenteditable="true" onblur="editor.syncBlock(this)" autofocus>Type here...</div>
      `;
      
      addBtn.parentNode.insertBefore(newBlock, addBtn);
      this.attachBlockHandlers();
      this.markDirty();
    },

    updateProperties(entry) {
      document.getElementById('propId').textContent = entry.id || '—';
      document.getElementById('propTitle').value = entry.title || '';
      document.getElementById('propDesc').value = entry.short_description || '';
      document.getElementById('deleteBtn').disabled = false;
    },

    markDirty() {
      this.state.isDirty = true;
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('statusText').textContent = '● Unsaved changes';
    },

    updateWordCount() {
      const text = document.getElementById('editorContent').innerText;
      const words = text.split(/\s+/).filter(w => w).length;
      document.getElementById('wordCount').textContent = `${words} words`;
    },

    async saveChanges() {
      try {
        const blocks = document.querySelectorAll('.block-content');
        const content = Array.from(blocks).map(b => b.innerText);
        
        if (this.state.currentEntry) {
          this.state.currentEntry.title = content[0] || this.state.currentEntry.title;
          this.state.currentEntry.short_description = content[1] || this.state.currentEntry.short_description;
        }

        // Save to localStorage as draft
        const key = `draft-${this.state.currentType}-${this.state.currentEntry?.id || 'new'}`;
        localStorage.setItem(key, JSON.stringify(this.state.currentEntry || this.state.currentData));
        
        this.state.isDirty = false;
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('statusText').textContent = '✓ Saved to draft';
        
        setTimeout(() => {
          document.getElementById('statusText').textContent = 'Ready';
        }, 2000);
      } catch (err) {
        this.showError(`Save failed: ${err.message}`);
      }
    },

    newEntry() {
      if (!this.state.currentType) {
        this.showError('Select a content type first');
        return;
      }

      const newEntry = {
        id: `new-entry-${Date.now()}`,
        title: 'New Entry',
        short_description: 'Click to edit...',
      };

      if (Array.isArray(this.state.currentData)) {
        this.state.currentData.push(newEntry);
        this.selectEntry(newEntry.id, this.state.currentData);
        this.renderContentType(this.state.currentType, this.state.currentData);
        this.markDirty();
      }
    },

    deleteEntry() {
      if (!this.state.currentEntry || !confirm('Delete this entry?')) return;

      const idx = this.state.currentData.indexOf(this.state.currentEntry);
      if (idx > -1) {
        this.state.currentData.splice(idx, 1);
        this.renderContentType(this.state.currentType, this.state.currentData);
        this.markDirty();
      }
    },

    exportJSON() {
      if (!this.state.currentData) return;
      
      const json = JSON.stringify(this.state.currentData, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${this.state.currentType}-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    },

    updateFileSelector() {
      document.querySelectorAll('.file-item').forEach(item => {
        item.classList.toggle('active', item.dataset.type === this.state.currentType);
      });
    },

    escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    },

    toggleTheme() {
      this.state.theme = this.state.theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('editor-theme', this.state.theme);
      this.applyTheme();
    },

    applyTheme() {
      document.body.classList.toggle('dark', this.state.theme === 'dark');
      document.getElementById('themeBtn').textContent = this.state.theme === 'dark' ? '☀️' : '🌙';
    },

    showError(msg) {
      console.error(msg);
    }
  };

  function formatBlock(type) {
    const sel = window.getSelection();
    if (sel.rangeCount === 0) return;
    
    const range = sel.getRangeAt(0);
    const block = range.commonAncestorContainer.closest?.('.block-content') || range.commonAncestorContainer.parentElement.closest?.('.block-content');
    
    if (!block) return;
    
    if (type === 'ul' || type === 'ol') {
      const tag = type === 'ul' ? '<ul>' : '<ol>';
      block.innerHTML = `${tag}<li>${block.innerText}</li></${type}>`;
    } else {
      block.dataset.type = type;
    }
  }

  // Initialize
  window.addEventListener('DOMContentLoaded', () => editor.init());
</script>

</body>
</html>
