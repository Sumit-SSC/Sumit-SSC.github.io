<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Content editor · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-2: #f8f9fb;
      --text: #1a1d21;
      --muted: #5c6370;
      --border: #dce0e6;
      --accent: #0d6e6e;
      --accent-hover: #0a5757;
      --danger: #c03434;
      --radius: 10px;
      --font: "DM Sans", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }
    body.theme-dark {
      --bg: #121418;
      --surface: #1c1f26;
      --surface-2: #242830;
      --text: #e8eaed;
      --muted: #9aa0a8;
      --border: #343a46;
      --accent: #3db8b8;
      --accent-hover: #52cccc;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      background: var(--bg);
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(440px, 520px) 1fr;
      min-height: 100vh;
      gap: 0;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
    }
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: 100vh;
      overflow: hidden;
    }
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .preview-col {
      background: var(--bg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-height: 50vh;
    }
    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }
    iframe#live-preview {
      flex: 1;
      width: 100%;
      min-height: 400px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .card h1 {
      margin: 0 0 4px;
      font-size: 17px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .card .sub {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .row.stack { flex-direction: column; align-items: stretch; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    input[type="text"], input[type="password"], select, textarea {
      width: 100%;
      font: inherit;
      color: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--surface);
    }
    textarea { resize: vertical; min-height: 72px; font-family: inherit; }
    textarea.mono { font-family: var(--mono); font-size: 12px; line-height: 1.5; }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }
    button:hover { filter: brightness(0.97); }
    body.theme-dark button:hover { filter: brightness(1.08); }
    button.primary {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover { background: var(--accent-hover); filter: none; }
    button.danger { background: var(--danger); border-color: transparent; color: #fff; font-weight: 600; }
    button.ghost { background: transparent; }
    button.tiny { padding: 5px 9px; font-size: 12px; }
    button.active {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
      font-weight: 600;
    }
    #status {
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      margin-top: 6px;
    }
    .segmented {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .segmented button { flex: 1; min-width: 0; white-space: nowrap; }
    .dev-tools {
      border-top: 1px dashed var(--border);
      margin-top: 10px;
      padding-top: 10px;
      display: grid;
      gap: 10px;
    }
    .shape-banner {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .shape-banner strong { color: var(--text); }
    /* Blocks */
    #panel-blocks .ribbon {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding-bottom: 10px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .blocks-list { display: grid; gap: 10px; max-height: min(52vh, 520px); overflow: auto; padding-right: 4px; }
    .block-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }
    .block-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }
    .block-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      cursor: grab;
      user-select: none;
      font-size: 11px;
      color: var(--muted);
    }
    .block-top:active { cursor: grabbing; }
    .block-top strong { color: var(--text); font-size: 12px; }
    .block-body { padding: 10px; }
    .block-editor-plain {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font: inherit;
      line-height: 1.5;
      resize: vertical;
    }
    .block-editor-plain:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    /* Records form */
    #panel-records .record-fields { display: grid; gap: 12px; }
    #panel-records .field-group { margin: 0; }
    #panel-records h2 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 650;
    }
    .checks { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .checks label { display: inline-flex; align-items: center; gap: 6px; margin: 0; font-weight: 500; color: var(--text); cursor: pointer; }
    /* Homepage UI */
    #panel-homepage-ui .ui-fields { display: grid; gap: 12px; }
    /* JSON */
    #json-editor {
      width: 100%;
      min-height: 200px;
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }
    .hidden { display: none !important; }
    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding-top: 4px;
    }
    .commit-list { max-height: 200px; overflow: auto; display: grid; gap: 8px; font-size: 12px; }
    .commit-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--surface);
    }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--border); }
    .b-healthy { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
    .b-broken { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--border)); }
    .b-needs { color: #b45309; border-color: var(--border); }
    body.theme-dark .b-needs { color: #fbbf24; }
    details.history { font-size: 12px; }
    details.history summary { cursor: pointer; font-weight: 600; color: var(--muted); padding: 4px 0; }
  </style>
</head>
<body class="theme-light">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-scroll">
        <div class="card">
          <div class="row" style="justify-content:space-between;">
            <div>
              <h1>Content editor</h1>
              <p class="sub">Edit site data, save draft, publish. Preview updates after publish.</p>
            </div>
            <button id="btn-theme" type="button" class="tiny ghost">Theme</button>
          </div>
          <div id="status"></div>
        </div>

        <div class="card">
          <label>Access</label>
          <div class="row">
            <input id="gate-password" type="password" placeholder="Admin password" style="flex:1;min-width:120px;" />
            <button id="btn-unlock" type="button" class="tiny">Unlock</button>
            <button id="btn-login" type="button" class="tiny primary">GitHub</button>
            <button id="btn-logout" type="button" class="tiny">Out</button>
          </div>
          <p id="session-line" class="sub" style="margin-top:8px;">Session…</p>
        </div>

        <div class="card stack row">
          <div class="row" style="width:100%;">
            <div style="flex:1;min-width:140px;">
              <label for="target">File</label>
              <select id="target">
                <option value="homepage">Intro blocks (homepage-content.json)</option>
                <option value="homepageUi">Section titles (homepage-ui.json)</option>
                <option value="projects">Projects list (projects.json)</option>
                <option value="caseStudies">Case studies list (case_studies.json)</option>
              </select>
            </div>
            <div style="flex:1;min-width:140px;">
              <label for="preview-slug">Preview page id</label>
              <input id="preview-slug" type="text" placeholder="e.g. fraud-intelligence-and-risk-analytics" />
            </div>
            <div style="align-self:flex-end;">
              <button id="btn-load" type="button" class="tiny primary">Reload file</button>
            </div>
          </div>
          <div id="target-help" class="sub"></div>
          <div id="shape-banner" class="shape-banner hidden"></div>

          <div class="segmented" style="margin-top:8px;">
            <button id="btn-view-smart" type="button" class="tiny active">Visual editor</button>
            <button id="btn-toggle-dev" type="button" class="tiny">Show code tools</button>
          </div>

          <div id="panel-smart" class="stack row">
            <div id="panel-blocks">
              <div class="ribbon">
                <button id="btn-add-paragraph" type="button" class="tiny">+ Text</button>
                <button id="btn-add-heading" type="button" class="tiny">+ Heading</button>
                <button id="btn-add-list" type="button" class="tiny">+ List</button>
                <span style="flex:1"></span>
                <button id="btn-dup-block" type="button" class="tiny">Duplicate</button>
                <button id="btn-del-block" type="button" class="tiny danger">Delete</button>
                <button id="btn-up-block" type="button" class="tiny">↑</button>
                <button id="btn-down-block" type="button" class="tiny">↓</button>
              </div>
              <div id="blocks-list" class="blocks-list"></div>
            </div>

            <div id="panel-records" class="hidden">
              <label for="record-select">Entry</label>
              <select id="record-select"></select>
              <div class="row segmented" style="margin-top: 8px; margin-bottom: 12px;">
                <button id="btn-add-record" type="button" class="tiny primary">+ Add Entry</button>
                <button id="btn-del-record" type="button" class="tiny danger">Delete</button>
                <button id="btn-up-record" type="button" class="tiny">↑ Move Up</button>
                <button id="btn-down-record" type="button" class="tiny">↓ Move Down</button>
              </div>
              <div id="record-fields" class="record-fields"></div>
            </div>

            <div id="panel-homepage-ui" class="hidden">
              <div id="homepage-ui-fields" class="ui-fields"></div>
            </div>

            <div id="panel-unknown" class="hidden">
              <p class="sub">This file shape is not supported in Form mode. Use <strong>Raw JSON</strong>.</p>
            </div>
          </div>

          <div id="dev-tools" class="dev-tools hidden">
            <div class="segmented">
              <button id="btn-view-smart-2" type="button" class="tiny active">Visual editor</button>
              <button id="btn-view-json" type="button" class="tiny">Raw JSON</button>
            </div>
            <textarea id="json-editor" class="mono hidden" spellcheck="false"></textarea>

            <div class="row" style="margin-top:2px;">
              <select id="backup-select" style="flex:1;"></select>
              <button id="btn-refresh-backups" type="button" class="tiny">Backups</button>
              <button id="btn-restore" type="button" class="tiny danger">Restore</button>
            </div>
            <details class="history">
              <summary>Commit labels (local)</summary>
              <div class="row" style="margin:8px 0;">
                <button id="btn-refresh-commits" type="button" class="tiny">Refresh</button>
                <button id="btn-mark-all-healthy" type="button" class="tiny">Mark all healthy</button>
              </div>
              <div id="commit-list" class="commit-list"></div>
            </details>
          </div>

          <div class="footer-actions">
            <button id="btn-save-publish" type="button" class="primary">Save + Publish</button>
            <button id="btn-save" type="button">Save draft</button>
            <button id="btn-publish" type="button">Publish only</button>
            <button id="btn-open-live" type="button" class="ghost">Open preview URL</button>
            <label class="checks"><input id="autosave" type="checkbox" checked /> Autosave</label>
          </div>
        </div>
      </div>
    </aside>

    <main class="preview-col">
      <div class="preview-head">
        <span>Live preview</span>
        <button id="btn-refresh-preview" type="button" class="tiny ghost">Refresh iframe</button>
      </div>
      <iframe id="live-preview" title="Live preview"></iframe>
    </main>
  </div>
  <script src="./new-editor.js?v=20260506-01"></script>
</body>
</html>
