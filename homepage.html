<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting to Projects…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Immediate redirect to new location -->
  <meta http-equiv="refresh" content="0; url=pages/homepage.html" />
  <script>
    // Preserve query string and hash when redirecting
    (function () {
      var target = 'pages/homepage.html' + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>
    This page has moved. If you are not redirected automatically,
    <a href="pages/homepage.html">click here to go to the projects homepage</a>.
  </p>
</body>
</html>
