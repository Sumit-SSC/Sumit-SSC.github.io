	<script>
		// Load skills from projects
		async function loadSkills() {
			const response = await fetch('data/projects.json');
			const projects = await response.json();
			const allSkills = new Set();
			
			projects.forEach(project => {
				if (project.tools) {
					project.tools.forEach(tool => allSkills.add(tool));
				}
			});

			const badgesContainer = document.getElementById('skills-badges');
			Array.from(allSkills).sort().forEach(skill => {
				const badge = document.createElement('button');
				badge.className = 'skill-badge px-4 py-2 rounded-full transition-colors font-bold';
				badge.textContent = skill;
				badge.dataset.skill = skill;
				badge.addEventListener('click', () => filterProjectsBySkill(skill, projects));
				badgesContainer.appendChild(badge);
			});
		}

		// Filter projects by skill
		function filterProjectsBySkill(skill, projects) {
			const filtered = projects.filter(p => p.tools && p.tools.includes(skill));
			const container = document.getElementById('filtered-projects');
			const list = document.getElementById('projects-list');
			
			if (filtered.length === 0) {
				container.classList.add('hidden');
				return;
			}

			container.classList.remove('hidden');
			list.innerHTML = filtered.map(project => `
				<div class="bg-white rounded-lg shadow-md p-4">
					<h4 class="font-bold text-gray-800 mb-2">${project.title}</h4>
					<p class="text-sm text-gray-600 mb-3">${project.short_description || ''}</p>
					<a href="project.html?id=${project.id}" class="text-primary hover:underline text-sm">View Project →</a>
				</div>
			`).join('');

			// Highlight active skill badge
			document.querySelectorAll('.skill-badge').forEach(b => {
				b.classList.remove('skill-badge-active');
			});
			const activeBadge = document.querySelector(`[data-skill="${skill}"]`);
			if (activeBadge) {
				activeBadge.classList.add('skill-badge-active');
			}
		}

		// Resume toggle functionality
		let resumeMinimized = null;
		
		document.getElementById('toggle-resume')?.addEventListener('click', () => {
			if (resumeMinimized === 'actual-resume') {
				// Restore actual resume, minimize portfolio
				document.getElementById('actual-resume').classList.remove('minimized');
				document.getElementById('portfolio-resume').classList.add('minimized');
				resumeMinimized = 'portfolio-resume';
			} else {
				// Restore portfolio, minimize actual resume
				document.getElementById('portfolio-resume').classList.remove('minimized');
				document.getElementById('actual-resume').classList.add('minimized');
				resumeMinimized = 'actual-resume';
			}
		});

		document.querySelectorAll('.minimize-btn').forEach(btn => {
			btn.addEventListener('click', (e) => {
				const panel = e.target.closest('.resume-panel');
				const panelId = panel.id;
				const otherPanel = panelId === 'actual-resume' ? 'portfolio-resume' : 'actual-resume';
				
				panel.classList.add('minimized');
				document.getElementById(otherPanel).classList.remove('minimized');
				resumeMinimized = panelId;
			});
		});

		// Scroll progress bar
		window.addEventListener('scroll', () => {
			const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
			const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
			const scrolled = (winScroll / height) * 100;
			document.getElementById('scroll-progress').style.width = scrolled + '%';
		});

		// Load skills on page load
		loadSkills();
	</script>
