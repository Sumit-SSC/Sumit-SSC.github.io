<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | Sumit S. Chaure</title>

    <link rel="icon" type="image/svg+xml" href="/assets/images/arrow.svg" />

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Fira+Sans:wght@200;500&display=swap");

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3B4CCA; /* Theme Primary Indigo */
            --eye-pupil-color: #080b18; /* Theme Navy-Black */
            --bg-color: #f8fafc; /* Slate 50 */
            --text-color: #0f172a; /* Slate 900 */
            --fs-heading: 36px;
            --fs-text: 35px;
            --fs-button: 18px;
            --fs-icon: 30px;
            --pupil-size: 30px;
            --eye-size: 80px;
            --button-padding: 15px 30px;
        }

        @media only screen and (max-width: 567px) {
            :root {
                --fs-heading: 26px;
                --fs-text: 20px;
                --fs-button: 15px;
                --fs-icon: 20px;
                --button-padding: 10px 20px;
                --eye-size: 60px;
                --pupil-size: 22px;
            }
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Fira Sans", sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Dark mode settings mapped to theme */
        body.dark-theme {
            --bg-color: #080b18; /* Dark navy-black */
            --text-color: #f1f5f9; /* Slate 100 */
            --primary-color: #2CB1A6; /* Theme Accent Teal in dark mode for contrast */
            --eye-pupil-color: #080b18;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            row-gap: 24px;
            text-align: center;
        }

        .error-page {
            margin: auto;
            padding: 20px;
        }

        .error-page__heading-title {
            text-transform: capitalize;
            font-size: var(--fs-heading);
            font-weight: 500;
            color: var(--primary-color);
        }

        .error-page__heading-desciption {
            margin-top: 10px;
            font-size: var(--fs-text);
            font-weight: 300;
        }

        .error-page__button {
            color: inherit;
            text-decoration: none;
            border: 2px solid var(--primary-color);
            font-size: var(--fs-button);
            font-weight: 500;
            padding: var(--button-padding);
            border-radius: 15px;
            box-shadow: 0px 7px 0px -2px var(--primary-color);
            transition: all 0.3s ease-in-out;
            text-transform: capitalize;
            cursor: pointer;
        }

        .error-page__button:hover {
            box-shadow: none;
            background-color: var(--primary-color);
            color: #ffffff !important;
        }

        .eyes {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .eye {
            width: var(--eye-size);
            height: var(--eye-size);
            background-color: var(--primary-color);
            border-radius: 50%;
            display: grid;
            place-items: center;
        }

        .eye__pupil {
            width: var(--pupil-size);
            height: var(--pupil-size);
            background-color: var(--eye-pupil-color);
            border-radius: 50%;
            animation: movePupil 2s infinite ease-in-out;
            transform-origin: center center;
        }

        @keyframes movePupil {
            0%,
            100% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(-12px, -12px);
            }

            50% {
                transform: translate(12px, 12px);
            }

            75% {
                transform: translate(-12px, 12px);
            }
        }
    </style>
</head>

<body>
    <main class="error-page">
        <div class="container">
            <div class="eyes">
                <div class="eye">
                    <div class="eye__pupil eye__pupil--left"></div>
                </div>
                <div class="eye">
                    <div class="eye__pupil eye__pupil--right"></div>
                </div>
            </div>

            <div class="error-page__heading">
                <h1 class="error-page__heading-title">Looks like you're lost</h1>
                <p class="error-page__heading-desciption">404</p>
            </div>

            <a class="error-page__button" href="/index.html" aria-label="back to home" title="back to home">back to home</a>
        </div>
    </main>

    <!-- Theme management script -->
    <script>
        (function() {
            var currentTheme = localStorage.getItem("theme");
            var defaults = { defaultMode: "system" };
            var mode = currentTheme || defaults.defaultMode;
            var isDark = mode === "dark";
            if (mode === "system") {
                isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            }
            if (isDark) {
                document.body.classList.add("dark-theme");
            } else {
                document.body.classList.remove("dark-theme");
            }
        })();
    </script>
</body>

</html>
